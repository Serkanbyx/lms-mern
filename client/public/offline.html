<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f17" />
    <meta name="robots" content="noindex" />
    <title>Offline · Lumen LMS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --bg-subtle: #f5f6f8;
        --text: #0b0f17;
        --text-muted: #5b6473;
        --border: #e3e5ea;
        --primary: #4f46e5;
        --primary-fg: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0f17;
          --bg-subtle: #11161f;
          --text: #f4f6fa;
          --text-muted: #97a0b1;
          --border: #1f2632;
          --primary: #818cf8;
          --primary-fg: #0b0f17;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family:
          'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica,
          Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        max-width: 460px;
        width: 100%;
        text-align: center;
        background: var(--bg-subtle);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px 28px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
      }

      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: var(--primary);
        color: var(--primary-fg);
      }

      .icon svg {
        width: 32px;
        height: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 0 24px;
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.55;
      }

      button {
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        background: var(--primary);
        color: var(--primary-fg);
        border: 0;
        border-radius: 10px;
        padding: 12px 22px;
        transition: transform 0.12s ease, opacity 0.12s ease;
      }

      button:hover {
        opacity: 0.92;
      }

      button:active {
        transform: translateY(1px);
      }

      .brand {
        margin-top: 28px;
        font-size: 13px;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" role="alert" aria-live="polite">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 1l22 22" />
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
            <line x1="12" y1="20" x2="12.01" y2="20" />
          </svg>
        </div>
        <h1>You&rsquo;re offline</h1>
        <p>
          We can&rsquo;t reach the network right now. Check your connection and
          try again — your progress is saved.
        </p>
        <button type="button" onclick="window.location.reload()">Retry</button>
        <div class="brand">Lumen LMS</div>
      </section>
    </main>

    <script>
      // Auto-retry the moment connectivity returns so the user doesn't
      // have to manually tap "Retry".
      window.addEventListener('online', function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
