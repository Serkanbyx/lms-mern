# =====================================================================
# Netlify build & runtime configuration for the Lumen LMS SPA.
# ---------------------------------------------------------------------
# Why this file exists:
#   - Pin Node + npm versions so prod builds match local dev.
#   - Tell Netlify the SPA lives under `client/` (monorepo layout).
#     Set the site's "Base directory" to `client` in the Netlify
#     dashboard so this file is discovered; all paths below are then
#     resolved relative to `client/`.
#   - Keep SPA fallback + edge headers consistent across previews
#     and production by promoting `public/_redirects` and
#     `public/_headers` (already shipped in the bundle).
#
# Anything secret (`VITE_API_BASE_URL`, etc.) lives on the Netlify
# dashboard under Site configuration → Environment variables. Do
# NOT hard-code real URLs / keys here — the file is committed to a
# public repo.
# =====================================================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Match server/package.json `"engines": { "node": ">=20.0.0" }`.
  NODE_VERSION = "20"
  NPM_VERSION  = "10"
  # Vite keeps the build snappy without dev-server overhead.
  CI           = "true"
  # Force npm to install devDependencies even when Netlify infers
  # NODE_ENV=production. Vite, Tailwind and the React plugin live
  # under devDependencies and are required at build time — without
  # this flag the build fails with `sh: 1: vite: not found`.
  NPM_FLAGS    = "--include=dev"

# ---------------------------------------------------------------------
# SPA fallback. `client/public/_redirects` already ships the same rule;
# this entry is a belt-and-braces guarantee in case the static file is
# ever removed by accident — Netlify merges both sources.
# ---------------------------------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ---------------------------------------------------------------------
# Cache the hashed Vite assets aggressively. Vite content-addresses
# every file under /assets/ so a new build naturally invalidates the
# CDN cache without us touching anything.
# ---------------------------------------------------------------------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the SPA shell — it has to fetch the latest hashed
# entry filenames on every reload.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Lighthouse / SEO friendliness for the SPA root.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"
